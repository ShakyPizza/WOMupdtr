{% extends "base.html" %}

{% block title %}Players - WOMupdtr{% endblock %}

{% block content %}
<section class="hero-panel compact">
    <div>
        <p class="eyebrow">Roster</p>
        <h1>Players</h1>
        <p class="lede">Search the tracker, sort the roster, and jump into player-specific history pages.</p>
    </div>
</section>

<article class="surface-card">
    <form class="player-controls"
          method="get"
          action="/players/"
          hx-get="/players/search"
          hx-target="#player-results"
          hx-swap="innerHTML"
          hx-trigger="keyup changed delay:250ms from:input, change from:select">
        <label>
            Search
            <input type="search" name="q" placeholder="Search players..." value="{{ query }}">
        </label>
        <label>
            Sort
            <select name="sort">
                <option value="ehb" {% if sort == "ehb" %}selected{% endif %}>EHB</option>
                <option value="rank" {% if sort == "rank" %}selected{% endif %}>Rank</option>
                <option value="name" {% if sort == "name" %}selected{% endif %}>Name</option>
            </select>
        </label>
        <button type="submit">Apply</button>
    </form>

    <div class="table-wrap">
        <table class="data-table" role="grid">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Rank</th>
                    <th>EHB</th>
                </tr>
            </thead>
            <tbody id="player-results">
                {% include "partials/player_row.html" %}
            </tbody>
        </table>
    </div>
</article>
{% endblock %}
